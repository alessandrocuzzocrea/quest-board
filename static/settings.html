<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settings — quest-board</title>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/api.js"></script>
</head>
<body>
<div id="nav"></div>
<div class="page" style="max-width:640px">
  <h1 class="mb-16">Settings</h1>

  <div class="settings-section">
    <h2>Profile</h2>
    <form onsubmit="return updateProfile(event)">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="settings-name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="settings-email" disabled style="opacity:.6">
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>

  <div class="settings-section">
    <h2>Change Password</h2>
    <form onsubmit="return changePassword(event)">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" id="pw-current" required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="pw-new" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary">Update Password</button>
    </form>
  </div>

  <div class="settings-section">
    <h2>API Keys</h2>
    <div id="api-keys-list" class="mb-8"></div>
    <form onsubmit="return createApiKey(event)" class="flex gap-8">
      <input type="text" id="new-key-name" placeholder="Key name (e.g. ci)" required style="flex:1">
      <button type="submit" class="btn btn-primary">Generate</button>
    </form>
  </div>
</div>

<script>
let user = null;

async function init() {
  user = await requireAuth();
  if (!user) return;
  $('#user-name').textContent = user.name;
  $('#settings-name').value = user.name;
  $('#settings-email').value = user.email;
  loadApiKeys();
}
init();

async function updateProfile(e) {
  e.preventDefault();
  const name = $('#settings-name').value.trim();
  if (!name) return;
  try {
    await API.updateName(name);
    showAlert('Profile updated', 'success');
  } catch (err) { showAlert(err.message); }
}

async function changePassword(e) {
  e.preventDefault();
  const current = $('#pw-current').value;
  const newpw = $('#pw-new').value;
  if (!current || !newpw) return;
  try {
    await API.changePassword(current, newpw);
    showAlert('Password changed', 'success');
    $('#pw-current').value = '';
    $('#pw-new').value = '';
  } catch (err) { showAlert(err.message); }
}

async function loadApiKeys() {
  try {
    const keys = await API.listApiKeys();
    const list = $('#api-keys-list');
    if (!keys || keys.length === 0) {
      list.innerHTML = '<p class="text-sm">No API keys yet.</p>';
      return;
    }
    list.innerHTML = keys.map(k => `
      <div class="api-key-row">
        <div>
          <strong>${esc(k.name)}</strong>
          <div class="key">${esc(k.key || '')}</div>
        </div>
        <button class="btn btn-sm btn-danger" onclick="deleteApiKey('${k.id}')">Revoke</button>
      </div>
    `).join('');
  } catch (err) { showAlert(err.message); }
}

async function createApiKey(e) {
  e.preventDefault();
  const name = $('#new-key-name').value.trim();
  if (!name) return;
  try {
    await API.createApiKey({ name });
    $('#new-key-name').value = '';
    showAlert('API key created', 'success');
    loadApiKeys();
  } catch (err) { showAlert(err.message); }
}

async function deleteApiKey(id) {
  if (!confirm('Revoke this API key?')) return;
  try {
    await API.deleteApiKey(id);
    loadApiKeys();
  } catch (err) { showAlert(err.message); }
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
