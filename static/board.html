<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Board — quest-board</title>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/api.js"></script>
</head>
<body>
<div id="nav"></div>
<div class="page-wide">
  <div class="board-header">
    <div class="flex items-center justify-between">
      <div>
        <h1 id="board-title">Loading...</h1>
        <span class="slug" id="board-slug"></span>
      </div>
      <div class="flex gap-8">
        <button class="btn" onclick="window.location.href='/boards'">&larr; Boards</button>
        <button class="btn btn-danger" id="delete-board-btn" onclick="deleteBoard()">Delete Board</button>
      </div>
    </div>
  </div>

  <div class="kanban" id="kanban"></div>
</div>

<!-- Card detail modal -->
<div class="modal-overlay" id="card-modal" onclick="if(event.target===this)closePanel()">
  <div class="modal modal-card-v2">
    <div class="card-modal-header">
      <div>
        <h2 id="panel-title" style="font-size:18px;margin:0 0 2px">Card</h2>
        <span class="card-list-label" id="panel-list-name"></span>
      </div>
      <button class="btn btn-sm btn-icon" onclick="closePanel()">&times;</button>
    </div>
    <div class="card-modal-body">
      <div class="card-modal-main" id="modal-main">
      </div>
      <div class="card-modal-sidebar">
        <div class="panel-section">
          <h3>List Status</h3>
          <span class="list-status-badge" id="list-status-badge">doing</span>
        </div>
        <div class="panel-section">
          <h3>Add to Card</h3>
          <div class="sidebar-btn-group">
            <button class="sidebar-btn" onclick="showLabelsPicker()"><span class="sidebar-btn-icon">🏷</span> Labels</button>
            <button class="sidebar-btn" onclick="setDueDate()"><span class="sidebar-btn-icon">📅</span> Due Date</button>
            <button class="sidebar-btn" onclick="setStartDate()"><span class="sidebar-btn-icon">📅</span> Start Date</button>
            <button class="sidebar-btn" onclick="addTaskListPrompt()"><span class="sidebar-btn-icon">☑</span> Task List</button>
          </div>
        </div>
        <div class="panel-section">
          <h3>Actions</h3>
          <div class="sidebar-btn-group">
            <button class="sidebar-btn" id="archive-btn" onclick="archiveCard()"><span class="sidebar-btn-icon">📦</span> Archive</button>
            <button class="sidebar-btn" onclick="deleteCardFromPanel()"><span class="sidebar-btn-icon">🗑</span> Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add card modal -->
<div class="modal-overlay" id="add-card-modal">
  <div class="modal">
    <h2>Add Card</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="new-card-title" placeholder="Card title" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="new-card-desc" placeholder="Optional description"></textarea>
    </div>
    <input type="hidden" id="new-card-list-id">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('add-card-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createCard()">Add</button>
    </div>
  </div>
</div>

<!-- Add list modal -->
<div class="modal-overlay" id="add-list-modal">
  <div class="modal">
    <h2>Add List</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="new-list-name" placeholder="To Do" required>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('add-list-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createList()">Add</button>
    </div>
  </div>
</div>

<script>
let board = null;
let lists = [];
let boardId = null;
let dragCard = null;

async function init() {
  const user = await requireAuth();
  if (!user) return;
  const params = new URLSearchParams(location.search);
  boardId = params.get('id');
  if (!boardId) { window.location.href = '/boards'; return; }
  document.getElementById('nav').appendChild(navBar('board'));
  $('#user-name').textContent = user.name;
  await loadBoard();
}
init();

async function loadBoard() {
  try {
    board = await API.getBoard(boardId);
    $('#board-title').textContent = board.board.name;
    $('#board-slug').textContent = board.board.slug ? '/' + board.board.slug : '';
    lists = board.lists || [];
    renderKanban();
  } catch (err) {
    showAlert('Failed to load board: ' + err.message);
  }
}

function renderKanban() {
  const kanban = $('#kanban');
  if (!lists || lists.length === 0) {
    kanban.innerHTML = `<div class="kanban"><div class="empty-state"><div class="icon">&#128196;</div><p>No lists. Add one!</p></div></div>`;
    kanban.innerHTML += `<div style="margin-top:16px"><button class="btn btn-primary" onclick="showAddList()">+ Add List</button></div>`;
    return;
  }

  kanban.innerHTML = lists.map(list => `
    <div class="column" data-list-id="${list.id}">
      <div class="column-header">
        <span>${esc(list.name)} <span class="count">(${(list.cards || []).length})</span></span>
        <button class="btn btn-sm btn-icon" onclick="deleteList('${list.id}')" title="Delete list">&times;</button>
      </div>
      <div class="column-body" data-list-id="${list.id}"
           ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
        ${(list.cards || []).map(c => `
          <div class="kanban-card" draggable="true"
               data-card-id="${c.id}" data-list-id="${list.id}"
               ondragstart="onDragStart(event)" ondragend="onDragEnd(event)"
               onclick="openCard('${c.id}')">
            <h4>${esc(c.name)}</h4>
            ${c.description ? `<div class="desc">${esc(c.description)}</div>` : ''}
            ${c.labels && c.labels.length ? `<div class="labels">${c.labels.map(l => `<span class="label-dot" style="background:${l.color || '#4f8cff'}"></span>`).join('')}</div>` : ''}
            <div class="meta-row">
              ${c.comment_count ? `<span>&#128172; ${c.comment_count}</span>` : ''}
              ${c.checklist_total ? `<span>&#9744; ${c.checklist_done || 0}/${c.checklist_total}</span>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
      <div class="column-footer">
        <button class="btn btn-sm" style="width:100%" onclick="showAddCard('${list.id}')">+ Add Card</button>
      </div>
    </div>
  `).join('') + `
    <div class="column" style="min-width:200px;border:2px dashed var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="showAddList()">
      <span style="color:var(--text2)">+ Add List</span>
    </div>
  `;
}

// Drag and drop
function onDragStart(e) {
  dragCard = { id: e.target.dataset.cardId, listId: e.target.dataset.listId };
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', e.target.dataset.cardId);
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  $$('.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragCard = null;
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = e.currentTarget;
  if (!col.classList.contains('drag-over')) col.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

async function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const targetListId = e.currentTarget.dataset.listId;
  if (!dragCard || dragCard.listId === targetListId) return;
  try {
    await API.moveCard(dragCard.id, { list_id: targetListId });
    await loadBoard();
  } catch (err) { showAlert(err.message); }
}

// ---- Card detail modal ----
let currentCard = null;

async function openCard(cardId) {
  try {
    currentCard = await API.getCard(cardId);
    renderCardModal(currentCard);
    openModal('card-modal');
  } catch (err) { showAlert(err.message); }
}

function closePanel() {
  closeModal('card-modal');
  currentCard = null;
}

function renderCardModal(card) {
  // Header
  $('#panel-title').textContent = card.name;
  const listName = lists.find(l => l.id === card.list_id)?.name || '';
  $('#panel-list-name').textContent = listName;
  $('#list-status-badge').textContent = listName;

  // Archive button text
  const archiveBtn = $('#archive-btn');
  archiveBtn.innerHTML = card.is_closed
    ? '<span class="sidebar-btn-icon">📦</span> Send to Board'
    : '<span class="sidebar-btn-icon">📦</span> Archive';

  // Main area
  const main = $('#modal-main');
  let totalTasks = 0, doneTasks = 0;
  if (card.checklists) {
    for (const cl of card.checklists) {
      if (cl.tasks) {
        for (const t of cl.tasks) { totalTasks++; if (t.is_completed) doneTasks++; }
      }
    }
  }

  main.innerHTML = renderDescriptionSection(card)
    + renderTaskListsSection(card, totalTasks, doneTasks)
    + renderCommentsActionsSection(card);
}

function renderDescriptionSection(card) {
  const desc = card.description || '';
  return `
    <div class="panel-section">
      <div class="section-header">
        <span class="section-icon">📝</span>
        <h3>Description</h3>
        <button class="btn btn-sm btn-icon section-edit-btn" onclick="editDescription()" title="Edit description">✏️</button>
      </div>
      <div id="desc-view">${desc ? `<p>${esc(desc)}</p>` : '<p class="text-sm desc-placeholder">Add more detailed description</p>'}</div>
      <div id="desc-edit" style="display:none">
        <textarea id="desc-textarea" placeholder="Add more detailed description" style="width:100%;min-height:80px">${esc(desc)}</textarea>
        <div class="flex gap-8 mt-8">
          <button class="btn btn-primary btn-sm" onclick="saveDescription()">Save</button>
          <button class="btn btn-sm" onclick="cancelEditDescription()">Cancel</button>
        </div>
      </div>
    </div>`;
}

function renderTaskListsSection(card, totalTasks, doneTasks) {
  const checks = card.checklists || [];
  const pct = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;
  let html = `
    <div class="panel-section">
      <div class="section-header">
        <span class="section-icon">☑️</span>
        <h3>Task List</h3>
        <span class="task-progress-text">${doneTasks}/${totalTasks}</span>
        <div class="task-progress-bar"><div class="task-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div id="task-lists-content">`;
  if (checks.length === 0) {
    html += '<p class="text-sm desc-placeholder">No task lists yet</p>';
  } else {
    for (const cl of checks) {
      html += `<div class="task-list-block" data-tl-id="${cl.id}">
        <div class="task-list-header">
          <strong>${esc(cl.name)}</strong>
          <button class="btn btn-sm btn-icon" onclick="deleteTaskList('${cl.id}')" title="Delete list">&times;</button>
        </div>`;
      if (cl.tasks) {
        for (const t of cl.tasks) {
          html += `<div class="checklist-item" data-task-id="${t.id}" data-tl-id="${cl.id}">
            <input type="checkbox" ${t.is_completed ? 'checked' : ''} onchange="toggleTask('${cl.id}','${t.id}', this.checked)">
            <span class="${t.is_completed ? 'task-done' : ''}">${esc(t.name)}</span>
            <button class="btn btn-sm btn-icon task-del-btn" onclick="deleteTask('${cl.id}','${t.id}')">&times;</button>
          </div>`;
        }
      }
      html += `<div class="task-add-row">
        <input type="text" placeholder="Add another task" class="task-add-input"
               onkeydown="if(event.key==='Enter')addTask('${cl.id}', this)">
      </div>
      </div>`;
    }
  }
  html += '</div></div>';
  return html;
}

function renderCommentsActionsSection(card) {
  const comments = card.comments || [];
  return `
    <div class="panel-section">
      <div class="section-header">
        <span class="section-icon">📋</span>
      </div>
      <div class="comment-tabs">
        <button class="tab active" data-tab="comments" onclick="switchTab('comments', '${card.id}')">Comments</button>
        <button class="tab" data-tab="actions" onclick="switchTab('actions', '${card.id}')">Actions</button>
      </div>
      <div id="comments-panel" class="tab-panel active">
        <div id="comments-list" class="comments-list">
          ${comments.map(c => `
            <div class="comment">
              <span class="author">${esc(c.user?.name || 'Unknown')}</span>
              <span class="time">${new Date(c.created_at).toLocaleDateString()}</span>
              <div class="text">${esc(c.text)}</div>
            </div>
          `).join('')}
        </div>
        <textarea id="comment-text" placeholder="Write a comment..." style="width:100%;min-height:60px;margin-top:12px"></textarea>
        <button class="btn btn-primary btn-sm mt-8" onclick="addComment('${card.id}')">Comment</button>
      </div>
      <div id="actions-panel" class="tab-panel">
        <div id="actions-list" class="comments-list">
          <p class="text-sm">Loading actions...</p>
        </div>
      </div>
    </div>`;
}

// ---- Description ----
function editDescription() {
  $('#desc-view').style.display = 'none';
  $('#desc-edit').style.display = 'block';
}
function cancelEditDescription() {
  $('#desc-view').style.display = 'block';
  $('#desc-edit').style.display = 'none';
}
async function saveDescription() {
  const desc = $('#desc-textarea').value.trim() || null;
  try {
    await API.updateCard(currentCard.id, { description: desc });
    currentCard.description = desc;
    $('#desc-view').innerHTML = desc ? `<p>${esc(desc)}</p>` : '<p class="text-sm desc-placeholder">Add more detailed description</p>';
    cancelEditDescription();
  } catch (err) { showAlert(err.message); }
}

// ---- Task Lists ----
async function toggleTask(tlId, taskId, done) {
  try {
    await API.updateTask(currentCard.id, tlId, taskId, { is_completed: done });
    currentCard = await API.getCard(currentCard.id);
    renderCardModal(currentCard);
  } catch (err) { showAlert(err.message); }
}

async function addTask(tlId, input) {
  const name = input.value.trim();
  if (!name) return;
  try {
    await API.createTask(currentCard.id, tlId, { name });
    input.value = '';
    currentCard = await API.getCard(currentCard.id);
    renderCardModal(currentCard);
  } catch (err) { showAlert(err.message); }
}

async function deleteTask(tlId, taskId) {
  try {
    await API.deleteTask(currentCard.id, tlId, taskId);
    currentCard = await API.getCard(currentCard.id);
    renderCardModal(currentCard);
  } catch (err) { showAlert(err.message); }
}

async function deleteTaskList(tlId) {
  if (!confirm('Delete this task list and all its tasks?')) return;
  try {
    await API.deleteTaskList(currentCard.id, tlId);
    currentCard = await API.getCard(currentCard.id);
    renderCardModal(currentCard);
  } catch (err) { showAlert(err.message); }
}

async function addTaskListPrompt() {
  const name = prompt('Task list name:');
  if (!name) return;
  try {
    await API.addTaskList(currentCard.id, { card_id: currentCard.id, name });
    currentCard = await API.getCard(currentCard.id);
    renderCardModal(currentCard);
  } catch (err) { showAlert(err.message); }
}

// ---- Comments & Actions tabs ----
let currentCardIdForTab = null;
let actionsLoaded = false;

function switchTab(tab, cardId) {
  currentCardIdForTab = cardId;
  $$('.comment-tabs .tab').forEach(t => t.classList.remove('active'));
  $$('.tab-panel').forEach(p => p.classList.remove('active'));
  $(`.comment-tabs .tab[data-tab="${tab}"]`).classList.add('active');
  $(`#${tab}-panel`).classList.add('active');
  if (tab === 'actions' && !actionsLoaded) {
    loadActions(cardId);
  }
}

async function loadActions(cardId) {
  try {
    const actions = await API.listActions(cardId);
    const list = $('#actions-list');
    if (!actions || actions.length === 0) {
      list.innerHTML = '<p class="text-sm">No actions yet</p>';
    } else {
      list.innerHTML = actions.map(a => `
        <div class="comment">
          <span class="time">${new Date(a.created_at).toLocaleDateString()}</span>
          <div class="text">${esc(a.action_type)}: ${esc(a.data)}</div>
        </div>
      `).join('');
    }
    actionsLoaded = true;
  } catch (err) {
    $('#actions-list').innerHTML = '<p class="text-sm">Failed to load actions</p>';
  }
}

async function addComment(cardId) {
  const text = $('#comment-text').value.trim();
  if (!text) return;
  try {
    await API.createComment({ card_id: cardId, text });
    $('#comment-text').value = '';
    const comments = await API.listComments(cardId);
    currentCard.comments = comments;
    $('#comments-list').innerHTML = comments.map(c => `
      <div class="comment">
        <span class="author">${esc(c.user?.name || 'Unknown')}</span>
        <span class="time">${new Date(c.created_at).toLocaleDateString()}</span>
        <div class="text">${esc(c.text)}</div>
      </div>
    `).join('');
  } catch (err) { showAlert(err.message); }
}

// ---- Sidebar actions ----
async function showLabelsPicker() {
  // Simple approach: prompt for label name — full label picker would be more complex
  try {
    const labels = await API.listBoardLabels(boardId);
    if (!labels || labels.length === 0) {
      showAlert('No labels on this board. Create one in settings.', 'info');
      return;
    }
    const names = labels.map((l, i) => `${i+1}. ${l.name} (${l.color})`).join('\n');
    const choice = prompt(`Available labels:\n${names}\n\nEnter label number to toggle:`);
    const idx = parseInt(choice) - 1;
    if (isNaN(idx) || idx < 0 || idx >= labels.length) return;
    const label = labels[idx];
    // Check if already attached
    const has = currentCard.labels.some(l => l.id === label.id);
    if (has) {
      await API.removeCardLabel(currentCard.id, { label_id: label.id });
    } else {
      await API.addCardLabel(currentCard.id, { label_id: label.id });
    }
    currentCard = await API.getCard(currentCard.id);
    renderCardModal(currentCard);
  } catch (err) { showAlert(err.message); }
}

async function setDueDate() {
  const val = prompt('Due date (YYYY-MM-DD or text):', currentCard.due_date || '');
  if (val === null) return;
  try {
    await API.updateCard(currentCard.id, { due_date: val || null });
    currentCard.due_date = val || null;
  } catch (err) { showAlert(err.message); }
}

async function setStartDate() {
  const val = prompt('Start date (YYYY-MM-DD or text):', currentCard.start_date || '');
  if (val === null) return;
  try {
    await API.updateCard(currentCard.id, { start_date: val || null });
    currentCard.start_date = val || null;
  } catch (err) { showAlert(err.message); }
}

async function archiveCard() {
  try {
    const newClosed = !currentCard.is_closed;
    await API.updateCard(currentCard.id, { is_closed: newClosed });
    currentCard.is_closed = newClosed;
    renderCardModal(currentCard);
  } catch (err) { showAlert(err.message); }
}

async function deleteCardFromPanel() {
  if (!confirm('Delete this card?')) return;
  try {
    await API.deleteCard(currentCard.id);
    closePanel();
    await loadBoard();
  } catch (err) { showAlert(err.message); }
}

// Add card
function showAddCard(listId) {
  $('#new-card-list-id').value = listId;
  $('#new-card-title').value = '';
  $('#new-card-desc').value = '';
  openModal('add-card-modal');
  $('#new-card-title').focus();
}

async function createCard() {
  const name = $('#new-card-title').value.trim();
  if (!name) return;
  const listId = $('#new-card-list-id').value;
  try {
    await API.createCard({ list_id: listId, name, description: $('#new-card-desc').value.trim() || undefined });
    closeModal('add-card-modal');
    await loadBoard();
  } catch (err) { showAlert(err.message); }
}

// Add list
function showAddList() {
  $('#new-list-name').value = '';
  openModal('add-list-modal');
  $('#new-list-name').focus();
}

async function createList() {
  const name = $('#new-list-name').value.trim();
  if (!name) return;
  try {
    await API.createList({ board_id: boardId, name });
    closeModal('add-list-modal');
    await loadBoard();
  } catch (err) { showAlert(err.message); }
}

async function deleteList(listId) {
  if (!confirm('Delete this list and all its cards?')) return;
  // No dedicated endpoint visible — we'd need PUT /boards/:id or similar
  // The board update PUT might handle this
  // For now, show alert that this isn't supported directly
  showAlert('Delete list not directly supported via API', 'info');
}

async function deleteBoard() {
  if (!confirm('Delete this entire board? This cannot be undone.')) return;
  try {
    await API.deleteBoard(boardId);
    window.location.href = '/boards';
  } catch (err) { showAlert(err.message); }
}

function openModal(id) { $(`#${id}`).classList.add('open'); }
function closeModal(id) { $(`#${id}`).classList.remove('open'); }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
