<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quest-board</title>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/api.js"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <h1>quest-board</h1>
    <div id="alerts"></div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" onclick="switchTab('register')">Register</div>
    </div>

    <form id="login-form" class="auth-form active" onsubmit="return doLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
    </form>

    <form id="register-form" class="auth-form" onsubmit="return doRegister(event)">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="reg-name" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
    </form>
  </div>
</div>

<script>
function switchTab(name) {
  $$('.auth-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase() === name));
  $$('.auth-form').forEach(f => f.classList.remove('active'));
  $(`#${name}-form`).classList.add('active');
}

async function doLogin(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    await API.login($('#login-username').value, $('#login-password').value);
    window.location.href = '/boards.html';
  } catch (err) {
    showAlert(err.message);
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    await API.register($('#reg-username').value, $('#reg-password').value, $('#reg-name').value);
    window.location.href = '/boards.html';
  } catch (err) {
    showAlert(err.message);
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

// Check if already logged in
checkAuth().then(user => { if (user) window.location.href = '/boards.html'; });
</script>
</body>
</html>
