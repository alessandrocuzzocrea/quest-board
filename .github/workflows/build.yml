name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: quest
          POSTGRES_DB: quest
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo check --all-targets
      - run: cargo build --release
      - name: Create test database
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          createdb quest_test
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: quest
      - run: cargo test -- --test-threads=1
        env:
          DATABASE_URL: postgres://postgres:quest@localhost:5432/quest_test

  e2e:
    runs-on: ubuntu-latest
    needs: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: quest
          POSTGRES_DB: quest
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo build --release
      - name: Create test database
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          createdb quest_test
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: quest
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - name: Install dependencies
        run: |
          cd e2e
          npm ci
          npx playwright install chromium --with-deps
      - name: Run e2e tests
        run: |
          cd e2e
          npx playwright test
        env:
          DATABASE_URL: postgres://postgres:quest@localhost:5432/quest_test
          APP_SECRET: test-secret-for-e2e
