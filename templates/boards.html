{% extends "base.html" %}
{% block title %}Boards — quest-board{% endblock %}
{% block head %}<script src="/js/htmx.min.js"></script>{% endblock %}
{% block body %}
<div class="page">
  <div class="flex items-center justify-between mb-16">
    <h1>Boards</h1>
    <button class="btn btn-primary" onclick="showCreateBoard()">+ New Board</button>
  </div>

  <div class="search-bar mb-16" style="max-width:400px">
    <span class="icon">&#128269;</span>
    <input type="search" placeholder="Filter boards..." id="search-input" name="q"
           hx-get="/api/v1/search" hx-trigger="keyup changed delay:300ms"
           hx-target="#board-grid" hx-swap="innerHTML">
  </div>

  <div id="board-grid" class="board-grid"
       hx-get="/api/v1/boards/html"
       hx-trigger="load, board-updated from:body"></div>
</div>
<!-- Create board modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2>New Board</h2>
    <div class="form-group">
      <label for="new-board-name">Name</label>
      <input type="text" id="new-board-name" class="input" placeholder="My Board" required>
    </div>
    <div class="form-group">
      <label for="new-board-slug">Slug <span class="text-sm" style="color:var(--text2)">(optional, auto-generated)</span></label>
      <input type="text" id="new-board-slug" class="input" placeholder="my-board">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('create-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createBoard()">Create</button>
    </div>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h2>Delete Board</h2>
    <p id="delete-msg"></p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger" id="delete-confirm-btn" onclick="deleteConfirmed()">Delete</button>
    </div>
  </div>
</div>

<script>
let deleteTarget = null;

async function init() {
  const user = await requireAuth();
  if (!user) return;
  document.getElementById('nav').appendChild(navBar('boards'));
  $('#user-name').textContent = user.username;
}
init();

function openBoard(slug, name) {
  const namePart = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'board';
  window.location.href = `/board/${slug}/${namePart}`;
}

function showCreateBoard() { openModal('create-modal'); $('#new-board-name').focus(); }

async function createBoard() {
  const name = $('#new-board-name').value.trim();
  if (!name) return showAlert('Name is required');
  const slug = $('#new-board-slug').value.trim() || undefined;
  try {
    await API.createBoard({ name, slug });
    closeModal('create-modal');
    document.body.dispatchEvent(new Event('board-updated'));
  } catch (err) { showAlert(err.message); }
}

function confirmDelete(id, name) {
  deleteTarget = id;
  $('#delete-msg').textContent = `Delete "${name}"? This cannot be undone.`;
  openModal('delete-modal');
}

async function deleteConfirmed() {
  if (!deleteTarget) return;
  try {
    await API.deleteBoard(deleteTarget);
    closeModal('delete-modal');
    deleteTarget = null;
    document.body.dispatchEvent(new Event('board-updated'));
  } catch (err) { showAlert(err.message); }
}

function openModal(id) { $(`#${id}`).classList.add('open'); }
function closeModal(id) { $(`#${id}`).classList.remove('open'); }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
{% endblock %}
