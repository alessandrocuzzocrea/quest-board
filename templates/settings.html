{% extends "base.html" %}
{% block title %}Settings — quest-board{% endblock %}
{% block body %}
<div class="page" style="max-width:640px">
  <h1 class="mb-16">Settings</h1>

  <div class="settings-section">
    <h3>Account</h3>
    <p>Logged in as <strong id="settings-username"></strong></p>
  </div>

  <div class="settings-section">
    <h3>Change Password</h3>
    <form onsubmit="changePassword(event)">
      <div class="form-group">
        <label for="settings-current-password">Current Password</label>
        <input type="password" id="settings-current-password" class="input" required>
      </div>
      <div class="form-group">
        <label for="settings-new-password">New Password</label>
        <input type="password" id="settings-new-password" class="input" required>
      </div>
      <button class="btn btn-primary">Change Password</button>
    </form>
  </div>

  <div class="settings-section">
    <h3>API Keys</h3>
    <div id="api-keys-list" class="mb-16"></div>
    <form onsubmit="createApiKey(event)" class="flex gap-8">
      <input type="text" id="new-key-name" class="input" placeholder="Key name" required style="flex:1">
      <button class="btn btn-primary">Create Key</button>
    </form>
  </div>
</div>

<script>
let user = null;

async function init() {
  user = await requireAuth();
  if (!user) return;
  document.getElementById('nav').appendChild(navBar('settings'));
  $('#user-name').textContent = user.username;
  $('#settings-username').textContent = user.username;
  loadApiKeys();
}
init();

async function changePassword(e) {
  e.preventDefault();
  try {
    await API.changePassword($('#settings-current-password').value, $('#settings-new-password').value);
    showAlert('Password changed', 'success');
    $('#settings-current-password').value = '';
    $('#settings-new-password').value = '';
  } catch (err) {
    showAlert(err.message);
  }
}

async function loadApiKeys() {
  try {
    const keys = await API.listApiKeys();
    const list = $('#api-keys-list');
    list.innerHTML = keys.length
      ? keys.map(k => `<div class="api-key-row"><span>${esc(k.name)}</span><code class="key-preview">${esc(k.prefix)}…</code><span class="text-sm">${esc(k.last_used_at ? 'Last used ' + new Date(k.last_used_at).toLocaleDateString() : 'Never used')}</span><button onclick="deleteKey('${k.id}')" class="btn btn-sm btn-danger">Delete</button></div>`).join('')
      : '<p class="text-sm" style="color:var(--text2)">No API keys yet.</p>';
  } catch (err) {
    showAlert(err.message);
  }
}

async function createApiKey(e) {
  e.preventDefault();
  try {
    const res = await API.createApiKey({ name: $('#new-key-name').value });
    showAlert(`Key created: ${res.key} (copy it now, it won't be shown again)`, 'success');
    $('#new-key-name').value = '';
    loadApiKeys();
  } catch (err) {
    showAlert(err.message);
  }
}

async function deleteKey(id) {
  if (!confirm('Delete this API key?')) return;
  try {
    await API.deleteApiKey(id);
    loadApiKeys();
  } catch (err) {
    showAlert(err.message);
  }
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
{% endblock %}
